name: Сообщить об ошибке
description: Воспроизводимая техническая проблема расширения
title: "[Ошибка]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Не прикладывайте cookies, токены, пароли, полный HAR и закрытые судебные материалы. По возможности используйте общедоступное дело и обезличенные скриншоты.

  - type: input
    id: extension-version
    attributes:
      label: Версия расширения
      placeholder: "0.1.20"
    validations:
      required: true

  - type: input
    id: chrome-version
    attributes:
      label: Версия Chrome
      placeholder: "Например, 150.0.x"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Как воспроизвести
      description: Опишите последовательность действий без чувствительных данных.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Ожидаемый результат
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Фактический результат
    validations:
      required: true

  - type: checkboxes
    id: privacy
    attributes:
      label: Проверка данных
      options:
        - label: Я удалил(а) из сообщения cookies, токены, пароли и закрытые материалы.
          required: true
